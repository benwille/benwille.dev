name: Deploy to Raspberry Pi

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Build and publish to Raspberry Pi
    runs-on: [self-hosted, linux, x64]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build

      - name: Publish to web root
        run: |
          sudo mkdir -p /var/www/html/bwille/dist
          sudo rm -rf /var/www/html/bwille/dist/*
          sudo cp -R dist/* /var/www/html/bwille/dist/
        shell: bash
